<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Delivery · Restaurante Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/restaurant.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="delivery-shell">
<div id="loginScreen" class="login-screen">
  <form class="login-box" onsubmit="login(event)">
    <div class="brand" style="color:var(--ink);margin-bottom:18px"><span class="brand-mark">🛵</span><span>Portal Delivery</span></div>
    <p class="section-sub">Panel liviano solo para entregas y GPS.</p>
    <label class="field"><span>Correo</span><input id="loginEmail" type="email" required></label>
    <label class="field"><span>Contraseña</span><input id="loginPassword" type="password" required></label>
    <button class="btn" style="width:100%">Entrar</button>
  </form>
</div>

<div id="app" style="display:none">
  <header class="delivery-hero"><div class="container"><div class="brand"><span class="brand-mark">🛵</span><span>Delivery GPS</span></div><p>Actualiza ubicación sin cargar el Admin completo.</p></div></header>
  <main class="container section">
    <div style="display:flex;gap:12px;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:20px"><h1 class="section-title" style="margin:0">Mis entregas</h1><div><button class="btn secondary" onclick="loadOrders()">Actualizar</button> <button class="btn dark" onclick="logout()">Salir</button></div></div>
    <div id="orders"></div>
    <div class="grid grid-2" style="margin-top:24px">
      <div class="card delivery-card"><h2>Mapa actual</h2><div id="map" class="map"></div></div>
      <div class="card delivery-card"><h2>Estado GPS</h2><p id="gpsStatus" class="section-sub">GPS detenido.</p><p><b>Nota:</b> el navegador solo actualiza mientras esta página esté abierta y el delivery haya dado permiso.</p><div id="navLinks"></div></div>
    </div>
  </main>
</div>
<div id="toast" class="toast"></div>
<script>
const API_URL='PASTE_APPS_SCRIPT_WEB_APP_URL_HERE';
const state={sessionToken:localStorage.getItem('rt_delivery_session')||'',orders:[],activeOrder:null,watchId:null,lastLocation:null,map:null,marker:null,interval:null,updateSeconds:30};
function apiRequest(api,action,payload={}){payload.sessionToken=state.sessionToken;return new Promise((resolve,reject)=>{const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);window[cb]=(res)=>{delete window[cb];s.remove();resolve(res)};const s=document.createElement('script');s.src=API_URL+'?api='+api+'&action='+action+'&callback='+cb+'&payload='+encodeURIComponent(JSON.stringify(payload));s.onerror=()=>reject(new Error('API error'));document.body.appendChild(s)})}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function money(n){return Number(n||0).toFixed(2)}
async function login(e){e.preventDefault();const r=await apiRequest('delivery','login',{email:loginEmail.value,password:loginPassword.value});if(!r.success)return toast(r.message);state.sessionToken=r.data.sessionToken;localStorage.setItem('rt_delivery_session',state.sessionToken);await loadOrders()}
function logout(){stopGps();localStorage.removeItem('rt_delivery_session');location.reload()}
async function loadOrders(){if(!state.sessionToken){loginScreen.style.display='grid';app.style.display='none';return}const r=await apiRequest('delivery','bootstrap',{});if(!r.success){loginScreen.style.display='grid';app.style.display='none';toast(r.message);return}loginScreen.style.display='none';app.style.display='block';state.orders=r.data.orders||[];renderOrders();initMap()}
function renderOrders(){orders.innerHTML=state.orders.map(o=>`<article class="card delivery-card"><div style="display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap"><div><h2>${esc(o.orderId)}</h2><p><b>${esc(o.customerName)}</b> · ${esc(o.customerPhone)}</p><p>${esc(o.address)}</p><p><span class="badge">${esc(o.status)}</span> <span class="badge green">${esc(o.paymentStatus)}</span></p></div><div style="display:grid;gap:10px;align-content:start"><button class="btn" onclick="startDelivery('${esc(o.orderId)}')">Salir a entregar</button><button class="btn secondary" onclick="openMaps('${encodeURIComponent(o.address)}')">Abrir mapa</button><button class="btn success" onclick="completeDelivery('${esc(o.orderId)}')">Entregada</button></div></div><details><summary>Items</summary>${o.items.map(i=>`<p>${i.quantity}x ${esc(i.name)}</p>`).join('')}</details></article>`).join('')||'<div class="empty">No hay entregas asignadas.</div>'}
function initMap(){if(state.map)return;state.map=L.map('map').setView([29.6516,-82.3248],12);L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(state.map)}
function getLocationOnce(){return new Promise((resolve,reject)=>{if(!navigator.geolocation)return reject(new Error('Geolocation no disponible'));navigator.geolocation.getCurrentPosition(pos=>resolve(locFromPos(pos)),err=>reject(err),{enableHighAccuracy:true,timeout:12000,maximumAge:3000})})}
function locFromPos(pos){return {lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy,speed:pos.coords.speed||'',heading:pos.coords.heading||'',timestamp:new Date().toISOString()}}
function setMap(loc){if(!state.map)return;const ll=[loc.lat,loc.lng];if(!state.marker)state.marker=L.marker(ll).addTo(state.map);else state.marker.setLatLng(ll);state.map.setView(ll,16)}
async function startDelivery(orderId){try{state.activeOrder=orderId;const loc=await getLocationOnce();state.lastLocation=loc;setMap(loc);const r=await apiRequest('delivery','startDelivery',{orderId,location:loc});toast(r.message);gpsStatus.textContent='GPS activo para '+orderId;startWatch(orderId);await loadOrders()}catch(e){toast('GPS no permitido o falló. Puedes intentar de nuevo.');const r=await apiRequest('delivery','startDelivery',{orderId,location:{notes:'GPS rechazado'}});toast(r.message)}}
function startWatch(orderId){stopGps(false);state.watchId=navigator.geolocation.watchPosition(pos=>{state.lastLocation=locFromPos(pos);setMap(state.lastLocation)},err=>{gpsStatus.textContent='Error GPS: '+err.message},{enableHighAccuracy:true,maximumAge:5000,timeout:15000});state.interval=setInterval(()=>sendUpdate(orderId),state.updateSeconds*1000);sendUpdate(orderId)}
async function sendUpdate(orderId){if(!state.lastLocation)return;const r=await apiRequest('delivery','updateDeliveryLocation',{orderId,location:state.lastLocation});gpsStatus.textContent=r.success?'Última actualización: '+new Date().toLocaleTimeString():r.message}
function stopGps(clear=true){if(state.watchId!=null)navigator.geolocation.clearWatch(state.watchId);if(state.interval)clearInterval(state.interval);state.watchId=null;state.interval=null;if(clear)gpsStatus.textContent='GPS detenido.'}
async function completeDelivery(orderId){try{const loc=state.lastLocation||await getLocationOnce();const r=await apiRequest('delivery','completeDelivery',{orderId,location:loc});toast(r.message);stopGps();await loadOrders()}catch(e){const r=await apiRequest('delivery','completeDelivery',{orderId,location:{notes:'GPS final no disponible'}});toast(r.message);stopGps();await loadOrders()}}
function openMaps(addr){const address=decodeURIComponent(addr);const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);const url=isIOS?'http://maps.apple.com/?daddr='+encodeURIComponent(address):'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(address);window.open(url,'_blank')}
loadOrders().catch(e=>toast(e.message));
</script>
</body></html>
